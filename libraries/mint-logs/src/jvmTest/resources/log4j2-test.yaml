Configuration:
  status: info
  name: YAMLConfigTest
  thresholdFilter:
    level: debug
  appenders:
    Console:
      name: STDOUT
      target: SYSTEM_OUT
      JsonLayout:
        objectMessageAsJsonObject: true
        includeTimeMillis: true
        eventEol: true
        compact: true
        properties: true
  Loggers:
    logger:
      -
        name: org.apache.logging.log4j.test1
        level: debug
        additivity: false
        AppenderRef:
          ref: STDOUT
    Root:
      level: info
      AppenderRef:
        ref: STDOUT