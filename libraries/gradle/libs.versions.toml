[versions]
io-kotest = "5.6.2"
org-jetbrains-kotlin = "1.9.0"
org-apache-logging-log4j = "2.20.0"

[libraries]
com-google-devtools-ksp-symbol-processing-api = "com.google.devtools.ksp:symbol-processing-api:1.9.0-1.0.11"
com-squareup-kotlinpoet-ksp = "com.squareup:kotlinpoet-ksp:1.14.2"
io-github-oshai-kotlin-logging = "io.github.oshai:kotlin-logging:5.0.0"
io-github-oshai-kotlin-logging-jvm = "io.github.oshai:kotlin-logging-jvm:5.0.0-beta-04"
io-kotest-kotest-framework-engine = { module = "io.kotest:kotest-framework-engine", version.ref = "io-kotest" }
io-kotest-kotest-runner-junit5-jvm = { module = "io.kotest:kotest-runner-junit5-jvm", version.ref = "io-kotest" }
org-jetbrains-kotlin-kotlin-bom = { module = "org.jetbrains.kotlin:kotlin-bom", version.ref = "org-jetbrains-kotlin" }
org-jetbrains-kotlinx-kotlinx-coroutines-bom = "org.jetbrains.kotlinx:kotlinx-coroutines-bom:1.7.2"
org-jetbrains-kotlinx-kotlinx-serialization-bom = "org.jetbrains.kotlinx:kotlinx-serialization-bom:1.5.1"
org-junit-junit-bom = "org.junit:junit-bom:5.9.3"
org-slf4j-slf4j-api = "org.slf4j:slf4j-api:2.0.7"
org-slf4j-slf4j-simple = "org.slf4j:slf4j-simple:2.0.7"
ch-qos-logback-logback-classic = "ch.qos.logback:logback-classic:1.4.8"
ch-qos-logback-contrib-logback-jackson = "ch.qos.logback.contrib:logback-jackson:0.1.5"
ch-qos-logback-contrib-logback-json-classic = "ch.qos.logback.contrib:logback-json-classic:0.1.5"
com-fasterxml-jackson-dataformat-jackson-dataformat-yml = "com.fasterxml.jackson.dataformat:jackson-dataformat-yaml:2.15.2"
com-fasterxml-jackson-core-jackson-databind = "com.fasterxml.jackson.core:jackson-databind:2.9.5"
net-logstash-logback-logstash-logback-encoder = "net.logstash.logback:logstash-logback-encoder:7.4"
org-apache-logging-log4j-log4j-api = { module = "org.apache.logging.log4j:log4j-api", version.ref = "org-apache-logging-log4j" }
org-apache-logging-log4j-log4j-core = { module = "org.apache.logging.log4j:log4j-core", version.ref = "org-apache-logging-log4j" }
org-apache-logging-log4j-log4j-iostreams = { module = "org.apache.logging.log4j:log4j-iostreams", version.ref = "org-apache-logging-log4j" }
org-apache-logging-log4j-log4j-slf4j2-impl = { module = "org.apache.logging.log4j:log4j-slf4j2-impl", version.ref = "org-apache-logging-log4j" }

[plugins]
com-github-sghill-distribution-sha = "com.github.sghill.distribution-sha:0.4.0"
io-github-gradle-nexus-publish-plugin = "io.github.gradle-nexus.publish-plugin:2.0.0-rc-1"
io-kotest-multiplatform = "io.kotest.multiplatform:5.6.2"
nl-littlerobots-version-catalog-update = "nl.littlerobots.version-catalog-update:0.8.0"
